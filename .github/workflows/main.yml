name: Auto request after test

on:
  push:
    branches-ignore:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v2

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 14

    - name: Install Dependencies
      run: npm install

    - name: Create Request push to main
      run: |
        TOKEN=${{ secrets.GITHUB_TOKEN }}
        REPO=${{ github.repository }}
        BRANCH=${{ github.event.ref }}
        TITLE="Automated Pull Request"
        BODY="This pull request is automatically generated."

        # Create a pull request
        curl -L \ 
          -X POST \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: Bearer TOKEN" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          https://api.github.com/repos/REPO/pulls \
          -d '{"title":"Amazing new feature","body":"Please pull these awesome changes in!","head":"octocat:new-feature","base":"master"}'
    
