name: Auto request after test

on:
  push:
    branches-ignore:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v2

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 14

    - name: Install Dependencies
      run: npm install

    - name: Create Request push to main
      run: |
        curl --request POST \
          --url https://api.github.com/repos/${{ github.repository }}/pulls \
          --header 'authorization: Bearer ${{ secrets.GITHUB_TOKEN }}' \
          --header 'content-type: application/json' \
          --data ''{
            "title": "Automated issue for commit: d23c8d794a3f685da831c86a7a2be9d5e5005379",
            "body": "This issue was automatically created by the GitHub Action workflow **Auto request after test**. \n\n The commit hash was: _d23c8d794a3f685da831c86a7a2be9d5e5005379_."
          }''\
          --fail
